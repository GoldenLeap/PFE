<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <a href=""><img src="https://placehold.co/32" alt="" /></a>
        <div class="search">
          <input type="text" /><i data-lucide="search"></i>
        </div>
        <div class="account">
          <img src="https://placehold.co/32x32" alt="" srcset="" />
        </div>
      </header>
      <aside class="sidebar">
        <ul>
          <li>Inicio</li>
          <li>Inscrições</li>
          <li>Você</li>
          <li>Histórico</li>
        </ul>
      </aside>
      <main>
        <div class="videos-grid">
          <div class="video">
            <div class="thumbnail-container">
              <img
                class="thumbnail"
                src="https://placehold.co/1280x720"
                alt=""
              />
            </div>
            <div class="video-details">
              <img src="https://placehold.co/32" alt="" />
              <div class="text-content">
                <h3 class="video-title">Titulo.</h3>
                <p class="channel-name">Nome do canal.</p>
                <p class="video-meta">muitas visualizações</p>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
